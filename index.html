<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Execute">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<title>Execute Tracker</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #121212;
    color: #ffffff;
    padding-bottom: 70px;
}

/* Header */
.header {
    background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
    padding: 20px 16px 12px;
    border-bottom: 1px solid #2a2a2a;
}

.date {
    font-size: 14px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.day-name {
    font-size: 28px;
    font-weight: 700;
    margin: 4px 0;
}

.xp-card {
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    border-radius: 16px;
    padding: 16px;
    margin: 16px;
    text-align: center;
}

.xp-label {
    font-size: 14px;
    opacity: 0.9;
}

.xp-value {
    font-size: 48px;
    font-weight: 800;
    line-height: 1;
}

.xp-total {
    font-size: 14px;
    opacity: 0.8;
    margin-top: 4px;
}

/* Category pills */
.categories {
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    overflow-x: auto;
    border-bottom: 1px solid #2a2a2a;
}

.category-pill {
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    background: #1e1e1e;
    color: #888;
    white-space: nowrap;
}

.category-pill.active {
    background: #e74c3c;
    color: white;
}

/* Tasks */
.tasks {
    padding: 16px;
}

.task-item {
    background: #1e1e1e;
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: all 0.2s;
}

.task-item.completed {
    opacity: 0.6;
}

.task-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
}

.task-check {
    width: 24px;
    height: 24px;
    border-radius: 24px;
    border: 2px solid #444;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
}

.task-item.completed .task-check {
    background: #2ecc71;
    border-color: #2ecc71;
    position: relative;
}

.task-item.completed .task-check::after {
    content: "✓";
    color: white;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
}

.task-info {
    flex: 1;
}

.task-name {
    font-size: 16px;
    font-weight: 500;
}

.task-xp {
    font-size: 12px;
    color: #e74c3c;
    margin-top: 4px;
}

.task-category {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 12px;
    background: #2a2a2a;
    color: #aaa;
}

/* Bottom nav */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1a1a1a;
    display: flex;
    justify-content: space-around;
    padding: 10px 0 20px;
    border-top: 1px solid #2a2a2a;
}

.nav-item {
    text-align: center;
    padding: 6px 12px;
    color: #666;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
}

.nav-item.active {
    color: #e74c3c;
}

.nav-icon {
    font-size: 24px;
    margin-bottom: 4px;
}

/* Sections */
.section {
    display: none;
    padding-bottom: 80px;
}

.section.active {
    display: block;
}

/* Stats cards */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 16px;
}

.stat-card {
    background: #1e1e1e;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
}

.stat-value {
    font-size: 32px;
    font-weight: 700;
    color: #e74c3c;
}

.stat-label {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
}

.streak-fire {
    font-size: 24px;
}

.history-list {
    padding: 16px;
}

.history-item {
    background: #1e1e1e;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
}

.history-date {
    font-size: 14px;
    color: #aaa;
}

.history-xp {
    font-size: 14px;
    color: #e74c3c;
    font-weight: 600;
}

/* Money section */
.money-card {
    background: linear-gradient(135deg, #1e4d2e, #0d2e1a);
    border-radius: 16px;
    padding: 20px;
    margin: 16px;
    text-align: center;
}

.money-amount {
    font-size: 36px;
    font-weight: 800;
}

.money-label {
    font-size: 12px;
    color: #aaa;
    margin-top: 4px;
}

.money-input {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 12px;
    margin: 16px;
}

.money-input input {
    background: transparent;
    border: none;
    color: white;
    font-size: 16px;
    width: 100%;
    padding: 8px;
}

.money-input button {
    background: #e74c3c;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    color: white;
    font-weight: 600;
    margin-top: 8px;
    width: 100%;
}

/* Notes */
.note-item {
    background: #1e1e1e;
    border-radius: 12px;
    padding: 12px;
    margin: 8px 16px;
}

.note-text {
    font-size: 14px;
    margin-bottom: 8px;
}

.note-date {
    font-size: 10px;
    color: #666;
}

.add-note {
    margin: 16px;
    display: flex;
    gap: 8px;
}

.add-note input {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px;
    color: white;
}

.add-note button {
    background: #e74c3c;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    color: white;
}

/* Buttons */
.reset-btn {
    background: #333;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    color: white;
    margin: 16px;
    font-size: 12px;
}
</style>
</head>
<body>

<div class="header">
    <div class="date" id="dateDisplay"></div>
    <div class="day-name" id="dayName"></div>
</div>

<div class="xp-card">
    <div class="xp-label">TODAY'S XP</div>
    <div class="xp-value" id="todayXp">0</div>
    <div class="xp-total" id="xpTotal">Total XP: 0</div>
</div>

<div class="categories" id="categories">
    <div class="category-pill active" data-cat="all">All</div>
    <div class="category-pill" data-cat="discipline">Discipline</div>
    <div class="category-pill" data-cat="body">Body</div>
    <div class="category-pill" data-cat="german">German</div>
    <div class="category-pill" data-cat="career">Career</div>
    <div class="category-pill" data-cat="growth">Growth</div>
</div>

<div class="tasks" id="tasksContainer"></div>

<div class="bottom-nav">
    <div class="nav-item active" data-section="home">
        <div class="nav-icon">📋</div>
        <div>Today</div>
    </div>
    <div class="nav-item" data-section="stats">
        <div class="nav-icon">📊</div>
        <div>Stats</div>
    </div>
    <div class="nav-item" data-section="money">
        <div class="nav-icon">💰</div>
        <div>Money</div>
    </div>
    <div class="nav-item" data-section="notes">
        <div class="nav-icon">📝</div>
        <div>Notes</div>
    </div>
</div>

<!-- Stats Section -->
<div class="section" id="statsSection">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="totalXpStat">0</div>
            <div class="stat-label">Total XP</div>
        </div>
        <div class="stat-card">
            <div class="stat-value streak-fire" id="streakValue">0</div>
            <div class="stat-label">Day Streak 🔥</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="daysTracked">0</div>
            <div class="stat-label">Days Tracked</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="bestStreak">0</div>
            <div class="stat-label">Best Streak</div>
        </div>
    </div>
    <div style="padding: 16px;"><strong>Last 7 days</strong></div>
    <div id="weekHistory" class="history-list"></div>
    <button class="reset-btn" id="resetBtn" style="background:#c0392b;">Reset All Data</button>
</div>

<!-- Money Section -->
<div class="section" id="moneySection">
    <div class="money-card">
        <div class="money-label">Current Balance</div>
        <div class="money-amount" id="balanceAmount">₹0</div>
    </div>
    <div class="money-input">
        <input type="number" id="incomeAmount" placeholder="Amount (₹)">
        <button id="addIncomeBtn">+ Add Income</button>
    </div>
    <div class="money-input">
        <input type="number" id="expenseAmount" placeholder="Amount (₹)">
        <input type="text" id="expenseDesc" placeholder="Description">
        <button id="addExpenseBtn">- Add Expense</button>
    </div>
    <div id="transactionsList" style="padding: 16px;"></div>
</div>

<!-- Notes Section -->
<div class="section" id="notesSection">
    <div class="add-note">
        <input type="text" id="noteInput" placeholder="Write a note...">
        <button id="addNoteBtn">Add</button>
    </div>
    <div id="notesList"></div>
</div>

<script>
// ========== UNLIMITED DATA - NO EXPIRATION ==========
// Data never gets deleted. Store forever.

const TASKS = [
    { id: "wake", name: "Wake by 7:30 AM", xp: 10, category: "discipline" },
    { id: "workout", name: "Workout done", xp: 15, category: "body" },
    { id: "german", name: "German 90 mins", xp: 15, category: "german" },
    { id: "noporn", name: "No porn", xp: 20, category: "discipline" },
    { id: "scroll", name: "Scroll under 30 min", xp: 10, category: "discipline" },
    { id: "sleep", name: "Sleep by 12:15 AM", xp: 10, category: "discipline" },
    { id: "career", name: "Career block 90 min", xp: 15, category: "career" },
    { id: "allergies", name: "No food allergies", xp: 10, category: "growth" }
];

let appData = {
    dailyProgress: {},  // { "2024-01-01": { "taskId": true, totalXp: 25 } }
    totalXp: 0,
    transactions: [],
    notes: [],
    streak: 0,
    bestStreak: 0,
    salary: 55000,
    balance: 0
};

let currentCategory = "all";
let currentSection = "home";

// Helper functions
function getToday() {
    return new Date().toISOString().split('T')[0];
}

function getDateKey(date) {
    return date;
}

function loadData() {
    const saved = localStorage.getItem("execute_unlimited_data");
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            appData = { ...appData, ...parsed };
        } catch(e) {}
    }
    updateUI();
}

function saveData() {
    localStorage.setItem("execute_unlimited_data", JSON.stringify(appData));
}

function getTodayProgress() {
    const today = getToday();
    if (!appData.dailyProgress[today]) {
        appData.dailyProgress[today] = { tasks: {}, totalXp: 0 };
    }
    return appData.dailyProgress[today];
}

function calculateTodayXp() {
    const progress = getTodayProgress();
    let total = 0;
    TASKS.forEach(task => {
        if (progress.tasks[task.id]) {
            total += task.xp;
        }
    });
    progress.totalXp = total;
    return total;
}

function updateTotalXp() {
    let total = 0;
    for (const date in appData.dailyProgress) {
        total += appData.dailyProgress[date].totalXp || 0;
    }
    appData.totalXp = total;
}

function toggleTask(taskId) {
    const today = getToday();
    if (!appData.dailyProgress[today]) {
        appData.dailyProgress[today] = { tasks: {}, totalXp: 0 };
    }
    
    if (appData.dailyProgress[today].tasks[taskId]) {
        delete appData.dailyProgress[today].tasks[taskId];
    } else {
        appData.dailyProgress[today].tasks[taskId] = true;
    }
    
    calculateTodayXp();
    updateTotalXp();
    updateStreak();
    saveData();
    updateUI();
}

function updateStreak() {
    let currentStreak = 0;
    let bestStreak = appData.bestStreak;
    const today = getToday();
    const dates = Object.keys(appData.dailyProgress).sort();
    
    // Check if today has any tasks completed
    const todayHasProgress = appData.dailyProgress[today] && 
        Object.keys(appData.dailyProgress[today].tasks || {}).length > 0;
    
    if (!todayHasProgress) {
        appData.streak = 0;
    } else {
        let streak = 1;
        let checkDate = new Date(today);
        while (true) {
            checkDate.setDate(checkDate.getDate() - 1);
            const dateStr = checkDate.toISOString().split('T')[0];
            const dayProgress = appData.dailyProgress[dateStr];
            const hasProgress = dayProgress && Object.keys(dayProgress.tasks || {}).length > 0;
            if (hasProgress) {
                streak++;
            } else {
                break;
            }
        }
        appData.streak = streak;
        if (streak > bestStreak) {
            appData.bestStreak = streak;
        }
    }
    
    if (appData.streak > (appData.bestStreak || 0)) {
        appData.bestStreak = appData.streak;
    }
    saveData();
}

function renderTasks() {
    const container = document.getElementById('tasksContainer');
    if (!container) return;
    
    const progress = getTodayProgress();
    let filteredTasks = TASKS;
    if (currentCategory !== "all") {
        filteredTasks = TASKS.filter(t => t.category === currentCategory);
    }
    
    container.innerHTML = filteredTasks.map(task => `
        <div class="task-item ${progress.tasks[task.id] ? 'completed' : ''}" onclick="toggleTask('${task.id}')">
            <div class="task-row">
                <div class="task-check"></div>
                <div class="task-info">
                    <div class="task-name">${task.name}</div>
                    <div class="task-xp">+${task.xp} XP</div>
                </div>
                <div class="task-category">${task.category}</div>
            </div>
        </div>
    `).join('');
    
    document.getElementById('todayXp').innerText = progress.totalXp || 0;
    document.getElementById('xpTotal').innerText = `Total XP: ${appData.totalXp || 0}`;
}

function renderStats() {
    document.getElementById('totalXpStat').innerText = appData.totalXp || 0;
    document.getElementById('streakValue').innerText = appData.streak || 0;
    document.getElementById('bestStreak').innerText = appData.bestStreak || 0;
    document.getElementById('daysTracked').innerText = Object.keys(appData.dailyProgress).length;
    
    // Last 7 days
    const weekHtml = [];
    for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const dateStr = d.toISOString().split('T')[0];
        const dayProgress = appData.dailyProgress[dateStr];
        const xp = dayProgress ? (dayProgress.totalXp || 0) : 0;
        weekHtml.push(`
            <div class="history-item">
                <span class="history-date">${dateStr}</span>
                <span class="history-xp">${xp} XP</span>
            </div>
        `);
    }
    document.getElementById('weekHistory').innerHTML = weekHtml.join('');
}

function renderMoney() {
    document.getElementById('balanceAmount').innerHTML = `₹${appData.balance || 0}`;
    const transactions = appData.transactions || [];
    const container = document.getElementById('transactionsList');
    if (container) {
        container.innerHTML = transactions.slice().reverse().slice(0, 20).map(t => `
            <div class="history-item">
                <span>${t.date} - ${t.desc || (t.type === 'income' ? 'Income' : 'Expense')}</span>
                <span style="color: ${t.type === 'income' ? '#2ecc71' : '#e74c3c'}">${t.type === 'income' ? '+' : '-'} ₹${t.amount}</span>
            </div>
        `).join('');
        if (transactions.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#666;">No transactions yet</div>';
        }
    }
}

function renderNotes() {
    const notes = appData.notes || [];
    const container = document.getElementById('notesList');
    if (container) {
        container.innerHTML = notes.slice().reverse().map(n => `
            <div class="note-item">
                <div class="note-text">${escapeHtml(n.text)}</div>
                <div class="note-date">${n.date}</div>
            </div>
        `).join('');
        if (notes.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#666;padding:20px;">No notes yet</div>';
        }
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function updateUI() {
    const today = getToday();
    const dateObj = new Date();
    document.getElementById('dateDisplay').innerText = dateObj.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('dayName').innerHTML = dateObj.toLocaleDateString('en-US', { weekday: 'long' });
    
    renderTasks();
    if (currentSection === 'stats') renderStats();
    if (currentSection === 'money') renderMoney();
    if (currentSection === 'notes') renderNotes();
}

function addIncome() {
    const amount = parseFloat(document.getElementById('incomeAmount').value);
    if (isNaN(amount) || amount <= 0) return;
    appData.balance = (appData.balance || 0) + amount;
    if (!appData.transactions) appData.transactions = [];
    appData.transactions.push({
        type: 'income',
        amount: amount,
        date: getToday(),
        desc: 'Income'
    });
    saveData();
    renderMoney();
    document.getElementById('incomeAmount').value = '';
}

function addExpense() {
    const amount = parseFloat(document.getElementById('expenseAmount').value);
    const desc = document.getElementById('expenseDesc').value || 'Expense';
    if (isNaN(amount) || amount <= 0) return;
    appData.balance = (appData.balance || 0) - amount;
    if (!appData.transactions) appData.transactions = [];
    appData.transactions.push({
        type: 'expense',
        amount: amount,
        date: getToday(),
        desc: desc
    });
    saveData();
    renderMoney();
    document.getElementById('expenseAmount').value = '';
    document.getElementById('expenseDesc').value = '';
}

function addNote() {
    const text = document.getElementById('noteInput').value;
    if (!text.trim()) return;
    if (!appData.notes) appData.notes = [];
    appData.notes.push({
        text: text.trim(),
        date: new Date().toLocaleString()
    });
    saveData();
    renderNotes();
    document.getElementById('noteInput').value = '';
}

function resetAllData() {
    if (confirm('⚠️ WARNING: This will delete ALL your data (XP, streaks, money, notes). This cannot be undone. Continue?')) {
        appData = {
            dailyProgress: {},
            totalXp: 0,
            transactions: [],
            notes: [],
            streak: 0,
            bestStreak: 0,
            salary: 55000,
            balance: 0
        };
        saveData();
        updateUI();
        if (currentSection === 'stats') renderStats();
        if (currentSection === 'money') renderMoney();
        if (currentSection === 'notes') renderNotes();
    }
}

// Navigation
document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
        const section = item.dataset.section;
        currentSection = section;
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        item.classList.add('active');
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(`${section}Section`).classList.add('active');
        if (section === 'stats') renderStats();
        if (section === 'money') renderMoney();
        if (section === 'notes') renderNotes();
    });
});

// Ca
